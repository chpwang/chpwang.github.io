    <p>Rails 指令</p>
<hr>
<h3 id="基本指令"><a href="#基本指令" class="headerlink" title="基本指令"></a>基本指令</h3><figure class="highlight bash"><table><tr><td class="code"><pre><div class="line"><span class="comment"># 在当前目录下新建 Rails app</span></div><div class="line">$ rails new [app名]</div><div class="line"></div><div class="line"><span class="comment"># Example</span></div><div class="line">$ rails new first_app</div><div class="line"></div><div class="line"><span class="comment"># 打开服务器</span></div><div class="line">$ rails s</div><div class="line">$ rails server</div><div class="line"></div><div class="line"><span class="comment"># 查看路径</span></div><div class="line">$ rails routes</div><div class="line"></div><div class="line">$ rails db:migrate      <span class="comment">#runs (single) migrations that have not run yet.</span></div><div class="line">$ rails db:create       <span class="comment">#creates the database</span></div><div class="line">$ rails db:drop         <span class="comment">#deletes the database</span></div><div class="line">$ rails db:schema:load  <span class="comment">#creates tables and columns within the (existing) database following schema.rb</span></div><div class="line">$ rails db:setup        <span class="comment">#does db:create, db:schema:load, db:seed</span></div><div class="line">$ rails db:reset        <span class="comment">#does db:drop, db:setup</span></div><div class="line"></div><div class="line"><span class="comment"># Example</span></div><div class="line"></div><div class="line">$ rails g controller groups</div><div class="line">$ rails g controller account/groups</div><div class="line">$ rails g controller account::groups</div></pre></td></tr></table></figure>
<hr>
<h3 id="Model"><a href="#Model" class="headerlink" title="Model"></a>Model</h3><figure class="highlight bash"><table><tr><td class="code"><pre><div class="line"><span class="comment"># 新建 Model</span></div><div class="line">$ rails g model [model 的名字] [参数名:参数类型] [参数名:参数类型] ...</div><div class="line"></div><div class="line"><span class="comment"># Example</span></div><div class="line">$ rails g model job title:string description:text wage_upper_bound:decimal wage_lower_bound:decimal contact:text is_hidden:boolean</div></pre></td></tr></table></figure>
<figure class="highlight bash"><table><tr><td class="code"><pre><div class="line">$ rails g migration [要添加的 migration 的名字]</div><div class="line"></div><div class="line"><span class="comment"># Example</span></div><div class="line">$ rails g migration add_user_id_to_job</div></pre></td></tr></table></figure>
<p>添加 column</p>
<figure class="highlight ruby"><table><tr><td class="code"><pre><div class="line"><span class="class"><span class="keyword">class</span> <span class="title">AddUserIdToJob</span> &lt; ActiveRecord::Migration[5.0]</span></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">change</span></span></div><div class="line">    add_column <span class="symbol">:jobs</span>, <span class="symbol">:user_id</span>, <span class="symbol">:integer</span></div><div class="line">  <span class="keyword">end</span></div><div class="line"><span class="keyword">end</span></div></pre></td></tr></table></figure>
<p>重命名 Column - 注意 job 要复数（之前新建 model 时 Job 用的是单数 - <code>rails g model job title:string</code>）</p>
<figure class="highlight ruby"><table><tr><td class="code"><pre><div class="line"><span class="class"><span class="keyword">class</span> <span class="title">ChangeWagesColumnNameInJob</span> &lt; ActiveRecord::Migration[5.1]</span></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">change</span></span></div><div class="line">    rename_column <span class="symbol">:jobs</span>, <span class="symbol">:upper_wage</span>, <span class="symbol">:wage_upper_bound</span></div><div class="line">    rename_column <span class="symbol">:jobs</span>, <span class="symbol">:lower_wage</span>, <span class="symbol">:wage_lower_bound</span></div><div class="line">  <span class="keyword">end</span></div><div class="line"><span class="keyword">end</span></div></pre></td></tr></table></figure>
<hr>
<h3 id="CRUD-模板"><a href="#CRUD-模板" class="headerlink" title="CRUD 模板"></a>CRUD 模板</h3><figure class="highlight ruby"><table><tr><td class="code"><pre><div class="line"><span class="class"><span class="keyword">class</span> <span class="title">GroupsController</span> &lt; ApplicationController</span></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">index</span></span></div><div class="line">    @groups = Group.all</div><div class="line">  <span class="keyword">end</span></div><div class="line"></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">new</span></span></div><div class="line">    @group = Group.new</div><div class="line">  <span class="keyword">end</span></div><div class="line"></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">show</span></span></div><div class="line">    @group = Group.find(params[<span class="symbol">:id</span>])</div><div class="line">  <span class="keyword">end</span></div><div class="line"></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">edit</span></span></div><div class="line">    @group = Group.find(params[<span class="symbol">:id</span>])</div><div class="line">  <span class="keyword">end</span></div><div class="line"></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">create</span></span></div><div class="line">    @group = Group.new(group_params)</div><div class="line"></div><div class="line">    <span class="keyword">if</span> @group.save</div><div class="line">      redirect_to groups_path</div><div class="line">    <span class="keyword">else</span></div><div class="line">      render <span class="symbol">:new</span></div><div class="line">    <span class="keyword">end</span></div><div class="line">  <span class="keyword">end</span></div><div class="line"></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">update</span></span></div><div class="line">    @group = Group.find(params[<span class="symbol">:id</span>])</div><div class="line"></div><div class="line">    <span class="keyword">if</span> @group.update(group_params)</div><div class="line">      redirect_to groups_path, <span class="symbol">notice:</span> <span class="string">'Update Success'</span></div><div class="line">    <span class="keyword">else</span></div><div class="line">      render <span class="symbol">:edit</span></div><div class="line">    <span class="keyword">end</span></div><div class="line">  <span class="keyword">end</span></div><div class="line"></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">destroy</span></span></div><div class="line">    @group = Group.find(params[<span class="symbol">:id</span>])</div><div class="line"></div><div class="line">    @group.destroy</div><div class="line">    redirect_to groups_path, <span class="symbol">alert:</span> <span class="string">'Group deleted'</span></div><div class="line">  <span class="keyword">end</span></div><div class="line"></div><div class="line">  private</div><div class="line"></div><div class="line">  <span class="function"><span class="keyword">def</span> <span class="title">group_params</span></span></div><div class="line">    params.<span class="keyword">require</span>(<span class="symbol">:group</span>).permit(<span class="symbol">:title</span>, <span class="symbol">:description</span>)</div><div class="line">  <span class="keyword">end</span></div><div class="line"><span class="keyword">end</span></div></pre></td></tr></table></figure>
